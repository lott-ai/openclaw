name: OpenClawTV
options:
  bundleIdPrefix: ai.openclaw
  deploymentTarget:
    tvOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  OpenClawKit:
    path: ../shared/OpenClawKit

schemes:
  OpenClawTV:
    shared: true
    build:
      targets:
        OpenClawTV: all
    test:
      targets:
        - OpenClawTVTests

targets:
  OpenClawTV:
    type: application
    platform: tvOS
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - package: OpenClawKit
      - package: OpenClawKit
        product: OpenClawChatUI
      - package: OpenClawKit
        product: OpenClawProtocol
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPENCLAW_TVOS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPENCLAW_TVOS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPENCLAW_TVOS_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(OPENCLAW_TVOS_APP_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "3"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: OpenClaw
        CFBundleShortVersionString: "2026.3.7"
        CFBundleVersion: "20260307"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocalNetworkUsageDescription: OpenClaw can connect to your OpenClaw gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true

  OpenClawTVTests:
    type: bundle.unit-test
    platform: tvOS
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    sources:
      - path: Tests
    dependencies:
      - target: OpenClawTV
      - package: OpenClawKit
      - package: OpenClawKit
        product: OpenClawChatUI
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPENCLAW_TVOS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPENCLAW_TVOS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.openclaw.tvos.tests
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenClawTV.app/OpenClawTV"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: OpenClawTVTests
        CFBundleShortVersionString: "2026.3.7"
        CFBundleVersion: "20260307"
